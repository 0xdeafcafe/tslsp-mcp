name: Release

on:
  push:
    branches: [main]
  # Manual trigger: re-publishes the current package.json version using
  # trusted publishing. Useful when a publish failed and the release-please
  # PR was already merged (so a normal push won't open a new release).
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  id-token: write # for npm trusted publishing (OIDC) + provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      # No NPM_TOKEN: npm trusted publishing (OIDC) issues a short-lived
      # credential from the id-token JWT. Configure the trusted publisher
      # for `tslsp-mcp` at https://www.npmjs.com/package/tslsp-mcp/access
      # → "Trusted Publisher" → GitHub Actions → workflow `release.yml`.
      - name: Publish
        run: pnpm publish --access public --no-git-checks --provenance
