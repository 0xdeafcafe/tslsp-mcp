name: Release

on:
  push:
    branches: [main]
  # Manual trigger: re-publishes the current package.json version using
  # trusted publishing. Useful when a publish failed and the release-please
  # PR was already merged (so a normal push won't open a new release).
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  id-token: write # for npm trusted publishing (OIDC) + provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    # Manual dispatch is for re-publishing the current package version; we
    # don't need release-please to run in that case (and its GitHub API
    # calls flake periodically, which would block the publish job).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: publish to npm
    needs: release-please
    # Run if release-please cut a release, OR if this was a manual dispatch
    # (in which case release-please was skipped). `always()` is required so
    # this `if` evaluates even when the upstream job didn't run.
    if: |
      always() &&
      (needs.release-please.outputs.release_created == 'true' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      # No NPM_TOKEN: npm trusted publishing (OIDC) issues a short-lived
      # credential from the id-token JWT. Trusted publisher is configured at
      # https://www.npmjs.com/package/@0xdeafcafe/tslsp-mcp/access
      #
      # Use `npm publish` (not `pnpm publish`) for the actual publish step:
      # only the npm CLI (>=11.5.1) performs the OIDC token exchange against
      # the npm registry. pnpm signs provenance fine but doesn't currently
      # do the trusted-publishing auth exchange.
      - name: Ensure npm >= 11.5.1
        run: npm install --global npm@latest

      - name: Publish
        run: npm publish --access public --provenance
